version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wishlist-backend
    restart: unless-stopped
    ports:
      - '5001:5001'
    environment:
      - MONGODB_URI=${MONGODB_URI}
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET:-access-secret-dev}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-refresh-secret-dev}
      - PORT=5001
      - NODE_ENV=production
      - CLIENT_URL=https://truba-app.ru
    networks:
      - wishlist-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: wishlist-frontend
    restart: unless-stopped
    ports:
      - '127.0.0.1:8080:80'
    depends_on:
      - backend
    networks:
      - wishlist-net

networks:
  wishlist-net:
    driver: bridge
